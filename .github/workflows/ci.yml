name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      # Smoke test: run the pipeline over ./fixtures and assert the output matches
      # scripts/selfpack.baseline.json. A drift fails CI until the baseline is updated.
      - run: node scripts/selfpack.js
