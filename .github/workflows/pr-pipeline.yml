# --- L9_META ---
# l9_schema: 1
# origin: l9-ci-core
# layer: [ci]
# tags: [L9_TEMPLATE, ci, caller-workflow]
# owner: platform
# status: active
# --- /L9_META ---
name: PR Pipeline

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # No base-branch filter: run on every PR, including stacked PRs whose base
    # is another feature branch. Previously [main, develop], which left stacked
    # PRs (e.g. base claude/**) with no Build & Test checks.
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: pr-pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Node/TypeScript Build & Test ───────────────────────────────────────────
  build-and-test:
    name: Build & Test (Node)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # ── Request Copilot + GitHub Code Review on PR open / push ─────────────────
  request-code-review:
    name: Request Copilot & GitHub Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' ||
       github.event.action == 'synchronize' ||
       github.event.action == 'ready_for_review' ||
       github.event.action == 'reopened')
    permissions:
      pull-requests: write
    steps:
      - name: Request Copilot + GitHub Code Review Agent
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            // Fetch current reviewers to avoid duplicate requests
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });
            const existing = pr.requested_reviewers.map(r => r.login);

            const bots = ['github-copilot[bot]', 'github-advanced-security[bot]'];
            const toRequest = bots.filter(b => !existing.includes(b));

            if (toRequest.length === 0) {
              core.notice('All review agents already requested — skipping.');
              return;
            }

            try {
              await github.rest.pulls.requestReviewers({
                owner, repo, pull_number,
                reviewers: toRequest
              });
              core.notice(`Requested reviewers: ${toRequest.join(', ')} on PR #${pull_number}`);
            } catch (e) {
              core.warning(`Reviewer request failed: ${e.message}`);
            }

  # ── Re-request review after ALL pending review threads are resolved ─────────
  rerequest-after-resolution:
    name: Re-request Review After All Threads Resolved
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event_name == 'pull_request_review_comment' &&
      github.event.action == 'created'
    permissions:
      pull-requests: write
    steps:
      - name: Check if all review threads resolved, then re-request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            // Use GraphQL to get all review threads and their resolved status
            const query = `
              query($owner: String!, $repo: String!, $pr: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100) {
                      nodes {
                        isResolved
                        isOutdated
                        comments(first: 1) {
                          nodes { author { login } }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, {
              owner, repo, pr: pull_number
            });

            const threads = result.repository.pullRequest.reviewThreads.nodes;

            // Only count active (non-outdated) threads
            const activeThreads = threads.filter(t => !t.isOutdated);
            const unresolvedCount = activeThreads.filter(t => !t.isResolved).length;
            const totalActive = activeThreads.length;

            core.notice(`Review threads: ${totalActive} active, ${unresolvedCount} unresolved`);

            if (totalActive === 0 || unresolvedCount > 0) {
              core.notice('Unresolved threads remain — skipping re-request.');
              return;
            }

            // All active threads resolved — re-request Copilot review
            const bots = ['github-copilot[bot]'];
            try {
              await github.rest.pulls.requestReviewers({
                owner, repo, pull_number,
                reviewers: bots
              });
              core.notice(`All threads resolved. Re-requested: ${bots.join(', ')} on PR #${pull_number}`);
            } catch (e) {
              core.warning(`Re-request failed: ${e.message}`);
            }
