name: PR Pipeline Gate
on:
  workflow_call:
jobs:
  megalinter:
    name: MegaLinter advisory
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: oxsecurity/megalinter/flavors/${{ inputs.megalinter-flavor }}@v8
        env:
          DISABLE_ERRORS: true
  lint:
    steps:
      - run: ruff check .
